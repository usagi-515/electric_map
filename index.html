<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夕食ステータス</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    margin: 0;
    padding: 15px;
    background: #f5f5f5;
  }

  h1 {
    text-align: center;
    margin-bottom: 15px;
  }

  .card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }

  .status-buttons {
    display: flex;
    gap: 10px;
  }

  .status-buttons button {
    flex: 1;
    padding: 15px 5px;
    font-size: 1rem;
    border-radius: 10px;
    border: none;
    background: #ddd;
  }

  .status-buttons button.active {
    color: white;
    font-weight: bold;
  }

  .raw { background: #9e9e9e; }
  .cooking { background: #ff9800; }
  .done { background: #4caf50; }

  input, textarea {
    width: 100%;
    font-size: 1rem;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-top: 8px;
  }

  button.save {
    width: 100%;
    padding: 15px;
    font-size: 1.1rem;
    border-radius: 10px;
    border: none;
    background: #2196f3;
    color: white;
    margin-top: 10px;
  }

  .view-status {
    font-size: 1.4rem;
    font-weight: bold;
  }
</style>
</head>

<body>

<h1>🍚 夕食ステータス</h1>

<div class="card">
  <div class="status-buttons">
    <button onclick="setStatus('未調理')" id="btn-未調理">未調理</button>
    <button onclick="setStatus('調理中')" id="btn-調理中">調理中</button>
    <button onclick="setStatus('調理済み')" id="btn-調理済み">調理済み</button>
  </div>

  <input id="menu" placeholder="献立（例：カレー）">
  <textarea id="message" rows="2" placeholder="メッセージ（例：牛乳買ってきて）"></textarea>

  <button class="save" onclick="save()">保存</button>
</div>

<div class="card">
  <div class="view-status" id="viewStatus">-</div>
  <div>🍽 献立：<span id="viewMenu">-</span></div>
  <div>📝 メモ：<span id="viewMessage">-</span></div>
  <div style="font-size:0.8rem;color:#666;margin-top:5px;">
    更新：<span id="viewTime">-</span>
  </div>
</div>

<script>
let currentStatus = "";

function setStatus(status) {
  currentStatus = status;

  ["未調理","調理中","調理済み"].forEach(s => {
    document.getElementById("btn-"+s).classList.remove("active","raw","cooking","done");
  });

  const btn = document.getElementById("btn-"+status);
  btn.classList.add("active");

  if (status === "未調理") btn.classList.add("raw");
  if (status === "調理中") btn.classList.add("cooking");
  if (status === "調理済み") btn.classList.add("done");
}

function save() {
  if (!currentStatus) {
    alert("ステータスを選択してください");
    return;
  }

  const data = {
    status: currentStatus,
    menu: menu.value,
    message: message.value,
    time: new Date().toLocaleString()
  };

  localStorage.setItem("dinner", JSON.stringify(data));
  load();
}

function load() {
  const data = JSON.parse(localStorage.getItem("dinner"));
  if (!data) return;

  currentStatus = data.status;
  setStatus(data.status);
  menu.value = data.menu || "";
  message.value = data.message || "";

  viewStatus.textContent = data.status;
  viewMenu.textContent = data.menu || "-";
  viewMessage.textContent = data.message || "-";
  viewTime.textContent = data.time;
}

load();
</script>

</body>
</html>
